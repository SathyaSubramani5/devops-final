<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Project V3</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    scroll-behavior: smooth;
    transition: 0.4s;
}

/* Dark mode */
.dark {
    background: #0f172a;
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 50px;
    background: #111827;
    color: white;
    position: sticky;
    top: 0;
}

.navbar a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

/* Toggle button */
.toggle {
    cursor: pointer;
    background: yellow;
    padding: 5px 10px;
}

/* Hero */
.hero {
    height: 100vh;
    background: linear-gradient(120deg, #2563eb, #7c3aed);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}

/* Button */
.btn {
    padding: 12px 25px;
    background: gold;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* Section */
.section {
    padding: 70px;
    text-align: center;
}

/* Cards */
.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.card {
    background: #e5e7eb;
    padding: 20px;
    width: 250px;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(50px);
    transition: 0.5s;
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

/* Contact */
input, textarea {
    padding: 10px;
    margin: 10px;
}

/* Footer */
.footer {
    background: #111827;
    color: white;
    padding: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="navbar">
    <div><b>DevOps V3</b></div>
    <div>
        <a href="#home">Home</a>
        <a href="#features">Features</a>
        <a href="#contact">Contact</a>
        <span class="toggle" onclick="toggleMode()">🌙</span>
    </div>
</div>

<div class="hero" id="home">
    <div>
        <h1>🚀 DevOps Project V3</h1>
        <p>Advanced Version with UI Enhancements</p>
        <button class="btn" onclick="scrollToSection()">Explore</button>
    </div>
</div>

<div class="section" id="features">
    <h2>Features</h2>
    <div class="cards">
        <div class="card">Git Init</div>
        <div class="card">Commit</div>
        <div class="card">Push</div>
    </div>
</div>

<div class="section" id="contact">
    <h2>Contact</h2>
    <input type="text" id="name" placeholder="Your Name"><br>
    <textarea id="msg" placeholder="Message"></textarea><br>
    <button class="btn" onclick="sendMessage()">Send</button>
</div>

<div class="footer">
    <p>© 2026 DevOps Project V3 | Sathya</p>
</div>

<script>
function scrollToSection() {
    document.getElementById("features").scrollIntoView();
}

// Dark mode toggle
function toggleMode() {
    document.body.classList.toggle("dark");
}

// Animation on scroll
window.addEventListener("scroll", () => {
    document.querySelectorAll(".card").forEach(card => {
        let position = card.getBoundingClientRect().top;
        if(position < window.innerHeight - 50) {
            card.classList.add("show");
        }
    });
});

// Form validation
function sendMessage() {
    let name = document.getElementById("name").value;
    if(name === "") {
        alert("Enter your name");
    } else {
        alert("Message Sent!");
    }
}
</script>

</body>
</html>
